services:
  memora-api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        APP_ENV: ${APP_ENV:-development}
    container_name: memora-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-development}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - memora-net
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./tests:/app/tests

  memora-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_ENV: ${APP_ENV:-development}
    container_name: memora-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - memora-net
    depends_on:
      memora-api:
        condition: service_healthy

networks:
  memora-net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: "172.28.0.0/16"
        - subnet: "fd00:dead:beef::/48"
